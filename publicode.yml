description:
  en:
    localisedName: extra parliamentary bodies
    shortDescription: Application for storing extra-parliamentary bodies and their members.
    longDescription: Application for managing extra-parliamentary bodies and their
      members. Evaluations in the form of statistics and publication of data on
      the internet as OGD. Handling and verification of general elections and
      supplementary elections. Preparation of Federal Council affairs for the
      election of members and reporting to parliament.
    documentation: https://github.com/swiss/extra-parliamentary-bodies-management/blob/main/README.md
    features:
      - managing extra-parliamentary bodies and their members
      - publication of the data as OGD
      - prepration of Federal Council affairs for the election of members
      - Execution and verfication of elections
  fr:
    localisedName: Organes extraparlementaires
    shortDescription: Application destinée à la gestion des organes extraparlementaires
    longDescription: Application destinée à la gestion des organes
      extraparlementaires et de leurs membres. Évaluations sous forme de
      statistiques et publication des données sur Internet sous forme de open 
      government data. Organisation et vérification des élections
      de renouvellement complet et des élections complémentaires. Préparation
      des affaires du Conseil fédéral pour l'élection des membres et rapport au
      Parlement.
    documentation: https://github.com/swiss/extra-parliamentary-bodies-management/blob/main/README.md
    features:
      - gestion des organes extraparlementaires et de leurs membres
      - publication des données en tant que open government data
      - préparation des affaires du Conseil fédéral pour l'élection des membres
      - exécution et vérification des élections
  de:
    localisedName: Ausserparlamentarische Gremien
    shortDescription: Anwendung zur Verwaltung von ausserparlamentarischen Gremien
    longDescription: Anwendung zur Verwaltung von ausserparlamentarischen Gremien
      und deren Mitgliedern. Auswertungen in Form von Statistiken und
      Publikation der Daten im Internet als OGD. Abwicklung und Überprüfung der
      Gesamterneuerungswahl sowie Ergänzungswahl. Erstellung von
      Bundesratsgeschäfte zur Wahl der Mitglieder und Bericht ans Parlament.
    documentation: https://github.com/swiss/extra-parliamentary-bodies-management/blob/main/README.md
    features:
      - Verwaltung außerparlamentarischer Gremien und ihrer Mitglieder
      - Veröffentlichung der Daten als OGD
      - Vorbereitung der Bundesratsgeschäfte zur Wahl der Mitglieder
      - Durchführung und Überprüfung von Wahlen
