<form [formGroup]="committeeSearchForm" id="committeeDataForm">
    <div class="committee-search">
        <mat-form-field obErrorMessages class="committee-search-field">
            <input
                type="text"
                placeholder="{{ 'memberships.search.committee' | translate }}*"
                matInput
                [formControl]="committeeSearchForm.controls.description"
                [matAutocomplete]="auto"
            />
            <mat-autocomplete #auto="matAutocomplete" (optionSelected)="setCommitteName($event)">
                @for (option of filteredOptions(); track option.id) {
                    <mat-option [value]="option">
                        <b>{{ option.description }}</b>
                    </mat-option>
                }
            </mat-autocomplete>
        </mat-form-field>

        <span class="committee-search-icon">
            @if (this.committeeSelected()) {
                <a href="committees/{{ this.committeeSelected()!.id }}" target="_blank"> <mat-icon svgIcon="link" class="ob-icon" /></a>
            }
        </span>
    </div>
</form>
