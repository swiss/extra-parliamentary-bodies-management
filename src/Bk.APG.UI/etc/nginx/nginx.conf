worker_processes 1;
daemon off;

error_log /dev/stderr;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  charset utf-8;

  default_type application/octet-stream;
  
  include mime.types;
  
  #include includes/security_headers.conf;
 

  
  sendfile on;

  tcp_nopush on;
  keepalive_timeout 30;
  port_in_redirect off;

  gzip on;

  access_log /dev/stdout;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    
    #add_header X-Content-Type-Options nosniff always;
    #add_header X-Frame-Options DENY always;
    #add_header X-XSS-Protection "1; mode=block" always;
    #add_header Referrer-Policy strict-origin-when-cross-origin always;
    #add_header Feature-Policy "microphone 'none'; payment 'none'; camera 'none'" always;
    #add_header Strict-Transport-Security "max-age=16070400; includeSubDomains" always;   #set again because it may have been overridden
    #add_header Content-Security-Policy "default-src 'none'; script-src 'self'; img-src 'self' data:; form-action 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.admin.ch; frame-src 'self'; frame-ancestors 'self';" always;
    
    location /systemstatus {
      include includes/security_headers.conf;
      default_type application/json;
      return 200 '{"status": "Healthy"}';
    }

    # Disable caching for JSON and HTML files
    location ~* \.(?:json|html)$ {
      include includes/security_headers.conf;
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
      expires epoch;
    }

    # Enable caching for JS and CSS files
    location ~* \.(?:js|css)$ {
      include includes/security_headers.conf;
      add_header Cache-Control "public";
      expires 1y;
    }

    # Enable caching for static assets
    location ~* \.(?:svg|jpe?g|png|gif|ico|woff2?)$ {
      include includes/security_headers.conf;
      add_header Cache-Control "public, must-revalidate";
      expires 1w;
    }

    # Fallback for single-page application
    location / {
      try_files $uri /index.html;
    }
  }
}
